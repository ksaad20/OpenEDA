name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package
        run: |
          pip install -e .

      - name: Install development tools
        run: |
          pip install \
            pytest \
            pytest-cov \
            black \
            ruff \
            flake8 \
            bandit

      - name: Install project requirements
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install -r requirements.txt

      - name: Repository diagnostics
        run: |
          echo "===== Working Directory ====="
          pwd

          echo
          echo "===== Repository ====="
          ls -la

          echo
          echo "===== Directory Tree ====="
          find . -maxdepth 3 -type d

      - name: Verify package import
        run: |
          python - <<'PY'
          import importlib

          module = importlib.import_module("openeda")

          print("Package imported successfully.")
          print("Module:", module)
          print("Location:", module.__file__)
          PY

      - name: Verify package structure
        run: |
          python - <<'PY'
          import pathlib

          root = pathlib.Path("openeda")

          assert root.exists(), "openeda directory not found"

          required = [
              "__init__.py",
              "netlist",
              "placement",
              "routing",
              "export",
              "bench",
          ]

          for item in required:
              path = root / item
              assert path.exists(), f"Missing {path}"

          print("Repository structure verified.")
          PY

      - name: Verify test_pipeline.py
        run: |
          test -f test_pipeline.py

      - name: Check formatting
        run: |
          black --check .

      - name: Ruff
        run: |
          ruff check .

      - name: Flake8
        run: |
          flake8 .

      - name: Security scan
        run: |
          bandit -r openeda

      - name: Run unit tests
        run: |
          pytest -v --cov=openeda --cov-report=xml

      - name: Run pipeline test
        run: |
          python test_pipeline.py

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

      - name: Upload pipeline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ matrix.python-version }}
          path: |
            output/**
            *.gds
          if-no-files-found: ignore
