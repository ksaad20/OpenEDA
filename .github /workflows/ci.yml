name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy flake8 black pytest
      
      - name: Lint code
        run: |
          flake8 openeda/ --max-line-length=100 --ignore=E203,W503 || true
          black --check openeda/ || true
      
      - name: Create example netlist
        run: |
          mkdir -p examples
          cat > examples/ota_2stage.sp << 'EOF'
          * OpenEDA Example: Two-Stage Miller OTA
          .SUBCKT OTA_2STAGE VDD VSS VIN+ VIN- VOUT
          M1   D1 VIN+ S VSS nmos W=2.0u L=0.15u
          M2   D2 VIN- S VSS nmos W=2.0u L=0.15u
          M3   S VBIAS VSS VSS nmos W=4.0u L=0.3u
          M4   D1 D1 VDD VDD pmos W=4.0u L=0.3u
          M5   D2 D1 VDD VDD pmos W=4.0u L=0.3u
          M6   VOUT VBIAS VSS VSS nmos W=8.0u L=0.15u
          M7   VOUT D2 VDD VDD pmos W=16.0u L=0.3u
          C1   VOUT D2 2.0p
          .ENDS
          EOF
      
      - name: Run pipeline test
        run: |
          python test_pipeline.py
      
      - name: Upload GDS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ota-layout-${{ github.run_id }}
          path: output/ota_layout.gds
          retention-days: 30
      
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: output/results.json
          retention-days: 30
      
      - name: Validate outputs
        run: |
          test -f output/ota_layout.gds && test -s output/ota_layout.gds || exit 1
          test -f output/results.json && test -s output/results.json || exit 1
          python -c "
          import json
          with open('output/results.json') as f:
              data = json.load(f)
          assert data['result_count'] == 1
          print(f\"Score: {data['results'][0]['metrics']['score']:.2f}\")
          "

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-${{ github.run_id }}'
          merge-multiple: true
          path: release-assets
      
      - name: Create release package
        run: |
          cd release-assets
          zip -r ../openeda-release-${{ github.run_number }}.zip .
      
      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: openeda-release-${{ github.run_number }}
          path: openeda-release-${{ github.run_number }}.zip
